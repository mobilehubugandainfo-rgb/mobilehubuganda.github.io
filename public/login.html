<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WiFi Login | Mobile Hub Uganda</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root {
            --cyan:#06b6d4; --violet:#7c3aed; --white:#f0f4ff;
            --muted:rgba(200,210,255,0.55); --glass:rgba(8,4,24,0.85);
        }
        html, body {
            width:100%; min-height:100%; background:#020008;
            font-family:'Rajdhani',sans-serif; color:var(--white);
            display:flex; align-items:center; justify-content:center; padding:20px;
            overflow-x:hidden;
        }
        #galaxy { position:fixed; inset:0; z-index:0; }
        .nebula {
            position:fixed; inset:0; z-index:1; pointer-events:none;
            background:radial-gradient(ellipse 70% 55% at 18% 28%, rgba(124,58,237,.25) 0%,transparent 65%);
            animation:nebDrift 20s ease-in-out infinite alternate;
        }
        @keyframes nebDrift{from{opacity:.85}to{opacity:1;transform:scale(1.05)}}
        .login-card {
            position:relative; z-index:10; width:100%; max-width:460px;
            background:var(--glass); border:1.5px solid rgba(124,58,237,.5); border-radius:24px;
            padding:40px 30px; text-align:center; backdrop-filter:blur(20px);
            box-shadow:0 0 60px rgba(124,58,237,.2);
            animation:cardIn .6s cubic-bezier(.22,.68,0,1.2) both;
        }
        @keyframes cardIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:none}}
        .logo { font-family:'Orbitron',sans-serif; font-size:1.8rem; font-weight:900; letter-spacing:3px; background:linear-gradient(90deg,#c084fc,#67e8f9); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:5px; }
        .status-pod { display:inline-flex; align-items:center; gap:6px; background:rgba(6,182,212,.1); border:1px solid rgba(6,182,212,.3); border-radius:30px; padding:4px 12px; font-family:'Orbitron',sans-serif; font-size:.55rem; color:#67e8f9; text-transform:uppercase; margin-bottom:25px; }
        .form-group { margin-bottom:20px; text-align:left; }
        .field-label { font-size:.6rem; letter-spacing:2px; text-transform:uppercase; color:#a78bfa; font-weight:700; font-family:'Orbitron',sans-serif; display:block; margin-bottom:8px; }
        input[type="text"] { width:100%; padding:15px; background:rgba(255,255,255,.05); border:1.5px solid rgba(124,58,237,.4); border-radius:12px; color:#fff; font-family:'Orbitron',sans-serif; font-size:1.2rem; text-align:center; letter-spacing:3px; text-transform:uppercase; transition:0.3s; }
        input[type="text"]:focus { border-color:var(--cyan); outline:none; box-shadow:0 0 15px rgba(6,182,212,0.3); }
        .connect-btn { width:100%; padding:16px; border:none; border-radius:12px; cursor:pointer; font-family:'Orbitron',sans-serif; font-size:.9rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#fff; background:linear-gradient(115deg,#7c3aed,#06b6d4); box-shadow:0 4px 20px rgba(124,58,237,0.4); transition:opacity 0.2s; }
        .connect-btn:disabled { opacity:0.5; cursor:not-allowed; }
        .status-msg { margin-top:15px; padding:12px; border-radius:10px; font-size:.85rem; display:none; animation:fadeIn 0.4s; }
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .buy-link { display:block; margin-top:18px; font-size:0.6rem; letter-spacing:1.5px; text-transform:uppercase; color:#a78bfa; font-family:'Orbitron',sans-serif; text-decoration:none; opacity:0.75; }
        .buy-link:hover { opacity:1; color:#67e8f9; }
        .restore-tab-btn {
            width:100%; padding:12px 16px; background:rgba(124,58,237,.12);
            border:1.5px solid rgba(124,58,237,.45); border-radius:12px; color:#c084fc;
            font-family:'Orbitron',sans-serif; font-size:0.6rem; letter-spacing:2px;
            text-transform:uppercase; cursor:pointer; transition:all .25s; text-align:center; margin-bottom:15px;
        }
        .restore-tab-btn:hover { background:rgba(124,58,237,.28); border-color:#a78bfa; color:#e9d5ff; }
    </style>
</head>
<body>

<canvas id="galaxy"></canvas>
<div class="nebula"></div>

<div class="login-card">
    <div class="logo">MOBILE HUB</div>
    <div class="status-pod">Secure Access Portal</div>

    <div class="form-group">
        <label class="field-label">Your Active Voucher</label>
        <div id="restoreHint" style="display:none;">
            <button type="button" class="restore-tab-btn" onclick="restoreVoucher()">
                ↩ Restore Previous Voucher
                <span id="hintCode" style="display:block; font-size:0.7rem; color:#67e8f9; margin-top:3px; letter-spacing:2px;"></span>
            </button>
        </div>
        <input type="text" id="voucherCode" placeholder="ENTER CODE..." autocomplete="off"
               oninput="this.value=this.value.toUpperCase()">
    </div>

    <button onclick="connectWiFi()" class="connect-btn" id="loginBtn">⚡ ACTIVATE INTERNET</button>
    <div id="status" class="status-msg"></div>

    <a href="https://mobilehubuganda-github-io.pages.dev/index.html" class="buy-link">💫 Buy a new voucher</a>
</div>

<script>
    var MIKROTIK_LOGIN_URLS = [
        'http://10.0.0.1/login'
    ];

    var DST_AFTER_LOGIN = 'https://mobilehubuganda-github-io.pages.dev/status.html';

    var _mac      = 'unknown';
    var _loginUrl = MIKROTIK_LOGIN_URLS[0];

    function isSafeLoginUrl(url) {
        try {
            var parsed = new URL(url);
            var host   = parsed.hostname;
            var proto  = parsed.protocol;
            return (
                (proto === 'http:'  && /^10\./.test(host))                       ||
                (proto === 'http:'  && /^192\.168\./.test(host))                 ||
                (proto === 'http:'  && /^172\.(1[6-9]|2\d|3[01])\./.test(host)) ||
                (proto === 'http:'  && host.endsWith('.mynetname.net'))           ||
                (proto === 'https:' && host.endsWith('.mynetname.net'))
            );
        } catch (e) { return false; }
    }

    function showStatus(msg, color) {
        var el = document.getElementById('status');
        el.style.display    = 'block';
        el.style.color      = color || '#fff';
        el.style.background = 'rgba(255,255,255,0.05)';
        el.style.border     = '1px solid rgba(255,255,255,0.1)';
        el.textContent      = msg;
    }

    window.onload = function () {
        var params = new URLSearchParams(window.location.search);

        _mac = params.get('mac') || localStorage.getItem('client_mac') || 'unknown';

        var savedUrl = params.get('link-login-only')
                    || params.get('link-login')
                    || localStorage.getItem('mikrotik_login_url');

        if (savedUrl && isSafeLoginUrl(savedUrl)) {
            _loginUrl = savedUrl;
            localStorage.setItem('mikrotik_login_url', savedUrl);
        } else {
            _loginUrl = MIKROTIK_LOGIN_URLS[0];
        }

        if (_mac !== 'unknown') localStorage.setItem('client_mac', _mac);

        var urlVoucher = params.get('voucher');
        if (urlVoucher) {
            document.getElementById('voucherCode').value = urlVoucher.toUpperCase();
            showStatus('🚀 Voucher ready — tap Activate to go online!', '#67e8f9');
            return;
        }

        var lastVoucher = localStorage.getItem('last_voucher');
        if (lastVoucher) {
            document.getElementById('hintCode').textContent      = lastVoucher.toUpperCase();
            document.getElementById('restoreHint').style.display = 'block';
            document.getElementById('voucherCode').value         = lastVoucher.toUpperCase();
            showStatus('↩ Previous voucher restored. Tap Activate to reconnect.', '#a78bfa');
        }
    };

    function restoreVoucher() {
        var last = localStorage.getItem('last_voucher');
        if (last) {
            document.getElementById('voucherCode').value = last.toUpperCase();
            showStatus('✅ Voucher loaded — connecting...', '#67e8f9');
            connectWiFi();
        }
    }

    async function connectWiFi() {
        var code   = document.getElementById('voucherCode').value.trim().toUpperCase();
        var btn    = document.getElementById('loginBtn');
        var params = new URLSearchParams(window.location.search);

        if (!code) { showStatus('⚠️ Please enter your voucher code.', '#ffa502'); return; }

        btn.disabled    = true;
        btn.textContent = 'AUTHORIZING...';
        showStatus('⏳ Verifying voucher...', '#67e8f9');

        // ── STEP 1: Validate voucher via Cloudflare (with 5s timeout) ──
        var actData = null;
        try {
            var actRes = await Promise.race([
                fetch(
                    'https://mobilehubuganda-github-io.pages.dev/api/voucher/activate',
                    {
                        method:  'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body:    JSON.stringify({
                            code:        code,
                            mac:         _mac,
                            tracking_id: params.get('tracking_id') || null
                        })
                    }
                ),
                new Promise(function(_, rej) {
                    setTimeout(function() { rej(new Error('timeout')); }, 5000);
                })
            ]);
            actData = await actRes.json();
        } catch (netErr) {
            console.warn('[LOGIN] Activation API unreachable:', netErr.message);
            actData = { success: false, _networkError: true };
        }

        if (!actData.success) {
            if (actData._networkError) {
                showStatus('⚡ Connecting to router...', '#fbbf24');
            } else {
                showStatus('⛔ ' + (actData.error || 'Activation failed. Try again.'), '#f87171');
                btn.disabled    = false;
                btn.textContent = '⚡ ACTIVATE INTERNET';
                return;
            }
        } else {
            localStorage.setItem('last_voucher', code);
            showStatus('✅ Verified! Connecting to network...', '#4ecdc4');
        }

        // ── STEP 2: Resolve MikroTik login URL ─────────────────────────
        var loginUrl = (_loginUrl && isSafeLoginUrl(_loginUrl)) ? _loginUrl : null;
        if (!loginUrl) {
            for (var i = 0; i < MIKROTIK_LOGIN_URLS.length; i++) {
                if (isSafeLoginUrl(MIKROTIK_LOGIN_URLS[i])) {
                    loginUrl = MIKROTIK_LOGIN_URLS[i];
                    break;
                }
            }
        }

        if (!loginUrl) {
            showStatus('⛔ Cannot find router. Make sure you are on Mobile Hub WiFi.', '#f87171');
            btn.disabled    = false;
            btn.textContent = '⚡ ACTIVATE INTERNET';
            return;
        }

        // ── STEP 3: Hand credentials back to MikroTik router page ──────
        // We do NOT submit directly to MikroTik from here because this
        // page is on HTTPS and MikroTik is on HTTP — browsers block that.
        // Instead we redirect back to the router-served login page (HTTP)
        // passing credentials as URL params. The router page receives them
        // and submits the login form natively over HTTP — no blocking.
        showStatus('⚡ Logging in...', '#67e8f9');

        var dst = DST_AFTER_LOGIN + '?voucher=' + encodeURIComponent(code);

        setTimeout(function () {
            window.location.href = loginUrl
                + '?username=' + encodeURIComponent(code)
                + '&password=' 
                + '&dst='      + encodeURIComponent(dst);
        }, 300);
    }

    // ── GALAXY BACKGROUND ─────────────────────────────────────────────
    (function () {
        var cv = document.getElementById('galaxy'), ctx = cv.getContext('2d');
        var W, H, stars = [];
        function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; mkStars(); }
        function mkStars() {
            stars = [];
            for (var i = 0; i < 60; i++) {
                stars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.2+.3, v: Math.random()*.3+.1 });
            }
        }
        function draw() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            stars.forEach(function(s) {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
                s.y -= s.v;
                if (s.y < 0) s.y = H;
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', resize);
        resize(); draw();
    })();
</script>
</body>
</html>
