<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WiFi Login | Mobile Hub Uganda</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root {
            --cyan:#06b6d4; --violet:#7c3aed; --white:#f0f4ff;
            --muted:rgba(200,210,255,0.55); --glass:rgba(8,4,24,0.85);
        }
        html, body {
            width:100%; min-height:100%; background:#020008;
            font-family:'Rajdhani',sans-serif; color:var(--white);
            display:flex; align-items:center; justify-content:center; padding:20px;
            overflow-x:hidden;
        }
        #galaxy { position:fixed; inset:0; z-index:0; }
        .nebula {
            position:fixed; inset:0; z-index:1; pointer-events:none;
            background:radial-gradient(ellipse 70% 55% at 18% 28%, rgba(124,58,237,.25) 0%,transparent 65%);
            animation:nebDrift 20s ease-in-out infinite alternate;
        }
        @keyframes nebDrift{from{opacity:.85}to{opacity:1;transform:scale(1.05)}}
        .login-card {
            position:relative; z-index:10; width:100%; max-width:460px;
            background:var(--glass); border:1.5px solid rgba(124,58,237,.5); border-radius:24px;
            padding:40px 30px; text-align:center; backdrop-filter:blur(20px);
            box-shadow:0 0 60px rgba(124,58,237,.2);
            animation:cardIn .6s cubic-bezier(.22,.68,0,1.2) both;
        }
        @keyframes cardIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:none}}
        .logo { font-family:'Orbitron',sans-serif; font-size:1.8rem; font-weight:900; letter-spacing:3px; background:linear-gradient(90deg,#c084fc,#67e8f9); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:5px; }
        .status-pod { display:inline-flex; align-items:center; gap:6px; background:rgba(6,182,212,.1); border:1px solid rgba(6,182,212,.3); border-radius:30px; padding:4px 12px; font-family:'Orbitron',sans-serif; font-size:.55rem; color:#67e8f9; text-transform:uppercase; margin-bottom:25px; }
        .form-group { margin-bottom:20px; text-align:left; }
        .field-label { font-size:.6rem; letter-spacing:2px; text-transform:uppercase; color:#a78bfa; font-weight:700; font-family:'Orbitron',sans-serif; display:block; margin-bottom:8px; }
        .restore-hint {
            font-size:0.55rem; color:#67e8f9; letter-spacing:1px;
            margin-bottom:8px; display:none; cursor:pointer;
            font-family:'Orbitron',sans-serif; text-align:center;
            background:rgba(6,182,212,0.08); border:1px solid rgba(6,182,212,0.25);
            border-radius:8px; padding:6px 10px;
        }
        .restore-hint:hover { background:rgba(6,182,212,0.18); }
        input[type="text"] { width:100%; padding:15px; background:rgba(255,255,255,.05); border:1.5px solid rgba(124,58,237,.4); border-radius:12px; color:#fff; font-family:'Orbitron',sans-serif; font-size:1.2rem; text-align:center; letter-spacing:3px; text-transform:uppercase; transition:0.3s; }
        input[type="text"]:focus { border-color:var(--cyan); outline:none; box-shadow:0 0 15px rgba(6,182,212,0.3); }
        .connect-btn { width:100%; padding:16px; border:none; border-radius:12px; cursor:pointer; font-family:'Orbitron',sans-serif; font-size:.9rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#fff; background:linear-gradient(115deg,#7c3aed,#06b6d4); box-shadow:0 4px 20px rgba(124,58,237,0.4); transition:opacity 0.2s; }
        .connect-btn:disabled { opacity:0.5; cursor:not-allowed; }
        .status-msg { margin-top:15px; padding:12px; border-radius:10px; font-size:.85rem; display:none; animation:fadeIn 0.4s; }
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .buy-link { display:block; margin-top:18px; font-size:0.6rem; letter-spacing:1.5px; text-transform:uppercase; color:#a78bfa; font-family:'Orbitron',sans-serif; text-decoration:none; opacity:0.75; }
        .buy-link:hover { opacity:1; color:#67e8f9; }

        /* Restore tab button */
        .restore-tab-btn {
            width: 100%;
            padding: 12px 16px;
            background: rgba(124, 58, 237, 0.12);
            border: 1.5px solid rgba(124, 58, 237, 0.45);
            border-radius: 12px;
            color: #c084fc;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            margin-bottom: 15px;
        }
        .restore-tab-btn:hover {
            background: rgba(124, 58, 237, 0.28);
            border-color: #a78bfa;
            color: #e9d5ff;
        }
    </style>
</head>
<body>

<canvas id="galaxy"></canvas>
<div class="nebula"></div>

<div class="login-card">
    <div class="logo">MOBILE HUB</div>
    <div class="status-pod">Secure Access Portal</div>

    <div class="form-group">
        <label class="field-label">Your Active Voucher</label>
        <div id="restoreHint" style="display:none;">
            <button type="button" class="restore-tab-btn" onclick="restoreVoucher()">
                ↩ Restore Previous Voucher
                <span id="hintCode" style="display:block; font-size:0.7rem; color:#67e8f9; margin-top:3px; letter-spacing:2px;"></span>
            </button>
        </div>
        <input type="text" id="voucherCode" placeholder="ENTER CODE..." autocomplete="off"
               oninput="this.value=this.value.toUpperCase()">
    </div>

    <button onclick="connectWiFi()" class="connect-btn" id="loginBtn">⚡ ACTIVATE INTERNET</button>
    <div id="status" class="status-msg"></div>

    <a href="https://mobilehubuganda-github-io.pages.dev/index.html" class="buy-link">💫 Buy a new voucher</a>
</div>

<script>
    // ── MikroTik session params captured from URL (MikroTik appends these) ──
    var _mac      = 'unknown';
    var _loginUrl = 'http://10.0.0.1/login';

    // ── Validate that a login URL is a safe local/router address ──
    function isSafeLoginUrl(url) {
        try {
            const parsed = new URL(url);
            const host   = parsed.hostname;

            if (parsed.protocol === 'http:') {
                return (
                    /^10\./.test(host)                          ||
                    /^192\.168\./.test(host)                    ||
                    /^172\.(1[6-9]|2\d|3[01])\./.test(host)    ||
                    host === '10.0.0.1'                         ||
                    host.endsWith('.mynetname.net')
                );
            }
            if (parsed.protocol === 'https:') {
                return host.endsWith('.mynetname.net');
            }
            return false;
        } catch {
            return false;
        }
    }

    function showStatus(msg, color) {
        const el = document.getElementById('status');
        el.style.display      = 'block';
        el.style.color        = color || '#fff';
        el.style.background   = 'rgba(255,255,255,0.05)';
        el.style.border       = '1px solid rgba(255,255,255,0.1)';
        el.textContent        = msg;
    }

    window.onload = function () {
        const params = new URLSearchParams(window.location.search);

        // Capture MikroTik params injected into the URL when it redirects here
        _mac      = params.get('mac')             || localStorage.getItem('client_mac')          || 'unknown';
        _loginUrl = params.get('link-login-only') || params.get('link-login')
                 || localStorage.getItem('mikrotik_login_url')
                 || 'http://10.0.0.1/login';

        // Persist for reconnections
        if (_mac !== 'unknown') localStorage.setItem('client_mac', _mac);
        if (_loginUrl)          localStorage.setItem('mikrotik_login_url', _loginUrl);

        // Auto-fill voucher from URL param (arriving from connecting.html: ?voucher=MH-XXXX)
        const urlVoucher = params.get('voucher');
        if (urlVoucher) {
            document.getElementById('voucherCode').value = urlVoucher.toUpperCase();
            showStatus('🚀 Voucher received! Click Activate to go online.', '#67e8f9');
            return;
        }

        // Restore last used voucher from localStorage
        const lastVoucher = localStorage.getItem('last_voucher');
        if (lastVoucher) {
            document.getElementById('hintCode').textContent    = lastVoucher.toUpperCase();
            document.getElementById('restoreHint').style.display = 'block';
            document.getElementById('voucherCode').value       = lastVoucher.toUpperCase();
            showStatus('↩ Previous voucher restored. Tap Activate to reconnect.', '#a78bfa');
        }
    };

    function restoreVoucher() {
        const last = localStorage.getItem('last_voucher');
        if (last) {
            document.getElementById('voucherCode').value = last.toUpperCase();
            showStatus('✅ Voucher loaded. Connecting...', '#67e8f9');
            connectWiFi();
        }
    }

    async function connectWiFi() {
        const code = document.getElementById('voucherCode').value.trim().toUpperCase();
        const btn  = document.getElementById('loginBtn');
        const params = new URLSearchParams(window.location.search);

        if (!code) { showStatus('⚠️ No voucher code entered.', '#ffa502'); return; }

        btn.disabled    = true;
        btn.textContent = 'AUTHORIZING...';
        showStatus('⏳ Verifying voucher with server...', '#67e8f9');

        // ── STEP 1: Activate / validate voucher on Cloudflare ──────────
        // This stamps the expiry clock and locks the MAC address.
        // MikroTik login NEVER fires unless this succeeds.
        let actData;
        try {
            const actRes = await fetch(
                'https://mobilehubuganda-github-io.pages.dev/api/voucher/activate',
                {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({
                        code,
                        mac:         _mac,
                        tracking_id: params.get('tracking_id') || null
                    })
                }
            );
            actData = await actRes.json();
        } catch (netErr) {
            showStatus('⛔ Network error — check your connection and try again.', '#f87171');
            btn.disabled    = false;
            btn.textContent = '⚡ ACTIVATE INTERNET';
            return;
        }

        // ── STRICT GATE: block MikroTik login if activation failed ──────
        // This guarantees: activate.js runs first → voucher validated / MAC locked
        // → ONLY THEN does MikroTik login happen.
        if (!actData.success) {
            showStatus('⛔ ' + (actData.error || 'Activation failed. Try again.'), '#f87171');
            btn.disabled    = false;
            btn.textContent = '⚡ ACTIVATE INTERNET';
            return;
        }

        // ── STEP 2: Save voucher for reconnection ───────────────────────
        localStorage.setItem('last_voucher', code);
        showStatus('✅ Voucher verified! Connecting to network...', '#4ecdc4');

        // ── STEP 3: Validate the MikroTik login URL ─────────────────────
        if (!isSafeLoginUrl(_loginUrl)) {
            showStatus('⛔ Router URL not detected. Reconnect to Mobile Hub WiFi first.', '#f87171');
            btn.disabled    = false;
            btn.textContent = '⚡ ACTIVATE INTERNET';
            return;
        }

        // ── STEP 4: Build MikroTik login form ───────────────────────────
        // dst tells MikroTik where to send the user AFTER it grants access.
        // Using 10.0.0.1/status (router-side) is the safest option.
        // After MikroTik grants internet, the user can navigate to status.html freely.
        const statusUrl = 'http://10.0.0.1/status';

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = _loginUrl;
        // NO form.target — must submit in main window so MikroTik's
        // session cookie and MAC-based firewall rule apply to this browser context.

        const fields = { username: code, password: code, dst: statusUrl };
        for (const key in fields) {
            const inp   = document.createElement('input');
            inp.type    = 'hidden';
            inp.name    = key;
            inp.value   = fields[key];
            form.appendChild(inp);
        }

        // ── STEP 5: Submit with a 300ms buffer ──────────────────────────
        // This buffer gives the backend time to:
        //   • commit voucher activation to DB
        //   • lock MAC address
        //   • finalize all DB writes
        // before MikroTik validates the credentials against its user table.
        setTimeout(() => {
            document.body.appendChild(form);
            form.submit();
        }, 300);
    }

    // ── GALAXY BACKGROUND ────────────────────────────────────────────────
    (function () {
        const cv = document.getElementById('galaxy'), ctx = cv.getContext('2d');
        let W, H, stars = [];

        function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; mkStars(); }

        function mkStars() {
            stars = [];
            for (let i = 0; i < 60; i++) {
                stars.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.2 + .3, v: Math.random() * .3 + .1 });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
                s.y -= s.v;
                if (s.y < 0) s.y = H;
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        resize(); draw();
    })();
</script>
</body>
</html>
