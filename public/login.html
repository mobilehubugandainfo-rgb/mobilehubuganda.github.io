<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WiFi Login | Mobile Hub Uganda</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root {
            --cyan:#06b6d4; --violet:#7c3aed; --white:#f0f4ff;
            --muted:rgba(200,210,255,0.55); --glass:rgba(8,4,24,0.82); --border:rgba(124,58,237,0.38);
        }
        html, body {
            width:100%; min-height:100%; background:#020008;
            font-family:'Rajdhani',sans-serif; color:var(--white);
            -webkit-user-select:text; user-select:text;
            display:flex; align-items:center; justify-content:center; padding:20px;
            overflow-x: hidden;
        }
        #galaxy { position:fixed; inset:0; z-index:0; }
        .nebula {
            position:fixed; inset:0; z-index:1; pointer-events:none;
            background:
                radial-gradient(ellipse 70% 55% at 18% 28%, rgba(124,58,237,.25) 0%,transparent 65%),
                radial-gradient(ellipse 55% 45% at 82% 68%, rgba(6,182,212,.18)  0%,transparent 60%),
                radial-gradient(ellipse 50% 40% at 55%  8%, rgba(236,72,153,.13) 0%,transparent 55%),
                radial-gradient(ellipse 45% 38% at  8% 82%, rgba(79,70,229,.20)  0%,transparent 60%);
            animation:nebDrift 20s ease-in-out infinite alternate;
        }
        @keyframes nebDrift{from{opacity:.85}to{opacity:1;transform:scale(1.06)}}
        .ss{position:fixed;z-index:2;pointer-events:none;width:2px;border-radius:2px;opacity:0;background:linear-gradient(to bottom,transparent,rgba(255,255,255,.88));}
        .ss1{height:90px;top:-90px;left:15%;animation:shoot 3.5s 0s linear infinite;}
        .ss2{height:70px;top:-70px;left:55%;animation:shoot 2.8s 1.8s linear infinite;}
        .ss3{height:110px;top:-110px;left:80%;animation:shoot 4.0s 3.2s linear infinite;}
        @keyframes shoot{0%{transform:translateY(0) rotate(14deg);opacity:0}6%{opacity:.8}85%{opacity:.2}100%{transform:translateY(115vh) rotate(14deg);opacity:0}}
        .login-card {
            position:relative; z-index:10; width:100%; max-width:460px;
            background:var(--glass); border:1.5px solid rgba(124,58,237,.5); border-radius:24px;
            padding:clamp(28px,6vw,44px) clamp(22px,6vw,40px); text-align:center;
            backdrop-filter:blur(24px);
            box-shadow:0 0 0 1px rgba(124,58,237,.1),0 0 60px rgba(124,58,237,.2),0 30px 80px rgba(0,0,0,.7);
            animation:cardIn .6s cubic-bezier(.22,.68,0,1.2) both;
        }
        @keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
        .hud{position:absolute;width:20px;height:20px;pointer-events:none;}
        .hud::before,.hud::after{content:'';position:absolute;background:var(--cyan);opacity:.55;}
        .hud::before{width:2px;height:12px;top:0;left:0} .hud::after{width:12px;height:2px;top:0;left:0}
        .hud.tl{top:12px;left:12px} .hud.tr{top:12px;right:12px;transform:scaleX(-1)}
        .hud.bl{bottom:12px;left:12px;transform:scaleY(-1)} .hud.br{bottom:12px;right:12px;transform:scale(-1)}
        .logo-wrap { margin-bottom:18px; }
        .logo {
            font-family:'Orbitron',sans-serif;
            font-size:clamp(1.4rem,5vw,1.9rem); font-weight:900; letter-spacing:4px; text-transform:uppercase; line-height:1;
            background:linear-gradient(90deg,#c084fc,#a78bfa,#67e8f9,#f0abfc);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            filter:drop-shadow(0 0 18px rgba(167,139,250,.8));
        }
        .logo-sub {
            font-size:clamp(.56rem,2vw,.68rem); letter-spacing:2.5px; text-transform:uppercase;
            color:#67e8f9; font-weight:600; margin-top:4px; text-shadow:0 0 14px rgba(6,182,212,.9);
        }
        .status-pod {
            display:inline-flex; align-items:center; gap:6px;
            background:rgba(6,182,212,.08); border:1px solid rgba(6,182,212,.3); border-radius:30px;
            padding:4px 12px; font-family:'Orbitron',sans-serif;
            font-size:.5rem; letter-spacing:1.5px; color:#67e8f9; text-transform:uppercase; margin-bottom:20px;
        }
        .orbit-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:oPulse 1.7s ease-in-out infinite;flex-shrink:0;}
        @keyframes oPulse{0%,100%{box-shadow:0 0 5px var(--cyan)}50%{box-shadow:0 0 12px var(--cyan);transform:scale(1.4)}}
        .divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,.4),rgba(6,182,212,.4),transparent);margin-bottom:22px;}
        .form-group { margin-bottom:18px; text-align:left; }
        .field-label {
            font-size:.58rem; letter-spacing:2px; text-transform:uppercase;
            color:#a78bfa; font-weight:700; font-family:'Orbitron',sans-serif; display:block; margin-bottom:7px;
        }
        input[type="text"] {
            width:100%; padding:15px 18px; background:rgba(255,255,255,.04);
            border:1.5px solid rgba(124,58,237,.35); border-radius:13px; color:#fff;
            font-family:'Orbitron',sans-serif; font-size:clamp(1rem,3.5vw,1.25rem);
            text-align:center; letter-spacing:4px; text-transform:uppercase;
            transition:border-color .2s, box-shadow .2s, background .2s;
        }
        input[type="text"]:focus {
            outline:none; border-color:var(--cyan); background:rgba(6,182,212,.06);
            box-shadow:0 0 20px rgba(6,182,212,.22);
        }
        .connect-btn {
            width:100%; padding:16px; border:none; border-radius:13px; cursor:pointer;
            font-family:'Orbitron',sans-serif; font-size:clamp(.75rem,2.8vw,.9rem);
            font-weight:700; letter-spacing:3px; text-transform:uppercase; color:#fff;
            background:linear-gradient(118deg,#6d28d9,#7c3aed 38%,#4f46e5 68%,#06b6d4);
            box-shadow:0 4px 28px rgba(124,58,237,.55);
            transition:all .22s ease;
        }
        .connect-btn:disabled{opacity:.6;cursor:not-allowed;}
        .status-msg {
            margin-top:14px; padding:11px 14px; border-radius:11px;
            font-size:.8rem; font-weight:600; display:none;
        }
        .whatsapp-btn {
            margin-top:14px; display:flex; align-items:center; justify-content:center; gap:9px;
            background:rgba(37,211,102,.1); border:1.5px solid rgba(37,211,102,.4);
            color:#86efac; padding:12px 16px; border-radius:12px;
            text-decoration:none; font-weight:700; font-size:.82rem;
        }
        .card-footer { margin-top:18px; padding-top:14px; border-top:1px solid rgba(124,58,237,.18); }
        .card-footer span { font-size:.56rem; color:rgba(167,139,250,.4); font-family:'Orbitron',sans-serif; }
    </style>
</head>
<body>

<canvas id="galaxy"></canvas>
<div class="nebula"></div>
<div class="ss ss1"></div><div class="ss ss2"></div><div class="ss ss3"></div>

<div class="login-card">
    <div class="hud tl"></div><div class="hud tr"></div>
    <div class="hud bl"></div><div class="hud br"></div>
    <div class="logo-wrap">
        <div class="logo">MOBILE HUB</div>
        <div class="logo-sub">Internet Access Portal</div>
    </div>
    <div class="status-pod"><div class="orbit-dot"></div>Hotspot Central · Active</div>
    <div class="divider"></div>
    <div class="form-group">
        <label class="field-label">Voucher Code</label>
        <input type="text" id="voucherCode" placeholder="ENTER CODE" autocomplete="off">
    </div>
    <button onclick="connectWiFi()" class="connect-btn" id="loginBtn">⚡ CONNECT NOW</button>
    
    <div id="recoverySection" style="display:none; margin-top:10px; font-size:0.7rem;">
        <p>Last used: <span id="savedDate" style="color:#f093fb;"></span></p>
        <button onclick="restoreVoucher()" style="background:none; border:none; color:#06b6d4; cursor:pointer; text-decoration:underline;">Restore Code</button>
    </div>

    <div id="status" class="status-msg"></div>

    <a href="index.html" style="color:var(--muted); font-size:0.7rem; display:block; margin-top:15px; text-decoration:none;">✦ Need a voucher? Buy here.</a>
    <a href="https://wa.me/256771999302" class="whatsapp-btn"><span>💬</span> WhatsApp Support</a>
    
    <div class="card-footer"><span>✦ Mobile Hub Uganda · 2026 ✦</span></div>
</div>

<script>
    var _mac = 'unknown';
    var _loginUrl = 'http://10.0.0.1/login';

    window.onload = function() {
        var params = new URLSearchParams(window.location.search);
        _mac = params.get('mac') || localStorage.getItem('client_mac') || 'unknown';
        localStorage.setItem('client_mac', _mac);

        var linkLogin = params.get('link-login-only') || params.get('link-login');
        if (linkLogin) {
            _loginUrl = linkLogin;
            localStorage.setItem('mikrotik_login_url', linkLogin);
        } else {
            _loginUrl = localStorage.getItem('mikrotik_login_url') || 'http://10.0.0.1/login';
        }

        var savedCode = localStorage.getItem('last_voucher');
        if (savedCode) {
            document.getElementById('recoverySection').style.display = 'block';
            document.getElementById('savedDate').innerText = localStorage.getItem('voucher_date') || 'recently';
        }
    };

    function restoreVoucher() {
        document.getElementById('voucherCode').value = localStorage.getItem('last_voucher');
    }

    async function connectWiFi() {
        var code = document.getElementById('voucherCode').value.trim().toUpperCase();
        var btn = document.getElementById('loginBtn');
        var mac = _mac;

        if (!code) {
            showStatus('⚠️ Enter voucher code', '#ffa502');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'CONNECTING...';
        showStatus('⏳ Verifying...', '#67e8f9');

        try {
            // STEP 1: API Activation
            var actRes = await fetch('https://mobilehubuganda-github-io.pages.dev/api/voucher/activate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code, mac: mac })
            });
            var actData = await actRes.json();
            if (!actData.success) throw new Error(actData.error || 'Activation Failed');

            // STEP 2: The Silent MikroTik Handshake
            localStorage.setItem('last_voucher', code);
            localStorage.setItem('voucher_date', new Date().toLocaleDateString());
            showStatus('✅ Connected! Redirecting...', '#4ecdc4');

            // Send login to MikroTik in background
            var ping = new Image();
            ping.src = _loginUrl + "?username=" + encodeURIComponent(code) + "&password=" + encodeURIComponent(code);

            // STEP 3: Hardcoded Jump to Status Page
            setTimeout(function() {
                window.location.href = "https://mobilehubuganda-github-io.pages.dev/status.html";
            }, 1500);

        } catch (err) {
            showStatus('⛔ ' + err.message, '#f87171');
            btn.disabled = false;
            btn.textContent = '⚡ CONNECT NOW';
        }
    }

    function showStatus(txt, col) {
        var el = document.getElementById('status');
        el.innerHTML = txt;
        el.style.display = 'block';
        el.style.color = col;
        el.style.border = '1px solid ' + col;
        el.style.background = col + '15';
    }

    (function(){
        var cv=document.getElementById('galaxy'), ctx=cv.getContext('2d');
        var W, H, stars=[];
        function resize(){ W=cv.width=window.innerWidth; H=cv.height=window.innerHeight; }
        function mkStars(){
            stars=[];
            for(var i=0; i<100; i++) stars.push({x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.2, v:Math.random()*0.3});
        }
        function draw(){
            ctx.clearRect(0,0,W,H);
            ctx.fillStyle="#fff";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
                s.y -= s.v; if(s.y < 0) s.y = H;
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', resize);
        resize(); mkStars(); draw();
    })();
</script>
</body>
</html>
