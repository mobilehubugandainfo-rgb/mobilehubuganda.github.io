<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WiFi Login | Mobile Hub Uganda</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
-webkit-user-select: text; user-select: text;

:root {
  --cyan:#06b6d4; --violet:#7c3aed; --white:#f0f4ff;
  --muted:rgba(200,210,255,0.55);
  --glass:rgba(8,4,24,0.82);
  --border:rgba(124,58,237,0.38);
}

html, body {
  width:100%; min-height:100%;
  background:#020008;
  font-family:'Rajdhani',sans-serif; color:var(--white);
  -webkit-user-select:text; user-select:text;
  display:flex; align-items:center; justify-content:center;
  padding:20px;
}

#galaxy { position:fixed; inset:0; z-index:0; }
.nebula {
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 55% at 18% 28%, rgba(124,58,237,.25) 0%,transparent 65%),
    radial-gradient(ellipse 55% 45% at 82% 68%, rgba(6,182,212,.18)  0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 55%  8%, rgba(236,72,153,.13) 0%,transparent 55%),
    radial-gradient(ellipse 45% 38% at  8% 82%, rgba(79,70,229,.20)  0%,transparent 60%);
  animation:nebDrift 20s ease-in-out infinite alternate;
}
@keyframes nebDrift{from{opacity:.85}to{opacity:1;transform:scale(1.06)}}
.ss{position:fixed;z-index:2;pointer-events:none;width:2px;border-radius:2px;opacity:0;background:linear-gradient(to bottom,transparent,rgba(255,255,255,.88));}
.ss1{height:90px;top:-90px;left:15%;animation:shoot 3.5s 0s linear infinite;}
.ss2{height:70px;top:-70px;left:55%;animation:shoot 2.8s 1.8s linear infinite;}
.ss3{height:110px;top:-110px;left:80%;animation:shoot 4.0s 3.2s linear infinite;}
.ss4{height:65px;top:-65px;left:6%;animation:shoot 3.2s 5.1s linear infinite;}
.ss5{height:80px;top:-80px;left:40%;animation:shoot 2.6s 6.5s linear infinite;}
@keyframes shoot{0%{transform:translateY(0) rotate(14deg);opacity:0}6%{opacity:.8}85%{opacity:.2}100%{transform:translateY(115vh) rotate(14deg);opacity:0}}

.login-card {
  position:relative; z-index:10;
  width:100%; max-width:460px;
  background:var(--glass);
  border:1.5px solid rgba(124,58,237,.5);
  border-radius:24px;
  padding:clamp(28px,6vw,44px) clamp(22px,6vw,40px);
  text-align:center;
  backdrop-filter:blur(24px);
  box-shadow:
    0 0 0 1px rgba(124,58,237,.1),
    0 0 60px rgba(124,58,237,.2),
    0 30px 80px rgba(0,0,0,.7);
  animation:cardIn .6s cubic-bezier(.22,.68,0,1.2) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}

.hud{position:absolute;width:20px;height:20px;pointer-events:none;}
.hud::before,.hud::after{content:'';position:absolute;background:var(--cyan);opacity:.55;}
