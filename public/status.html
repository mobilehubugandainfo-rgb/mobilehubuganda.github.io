<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Session Status | Mobile Hub Uganda</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --cyan:#06b6d4; --violet:#7c3aed; --white:#f0f4ff;
    --muted:rgba(200,210,255,0.55); --glass:rgba(8,4,24,0.85);
  }
  html, body {
    width:100%; min-height:100%; background:#020008;
    font-family:'Rajdhani',sans-serif; color:var(--white);
    display:flex; align-items:center; justify-content:center; padding:20px;
    overflow: hidden;
  }
  #galaxy { position:fixed; inset:0; z-index:0; }
  .nebula {
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background:
      radial-gradient(ellipse 70% 55% at 18% 28%, rgba(124,58,237,.25) 0%,transparent 65%),
      radial-gradient(ellipse 55% 45% at 82% 68%, rgba(6,182,212,.18) 0%,transparent 60%);
    animation:nebDrift 20s ease-in-out infinite alternate;
  }
  @keyframes nebDrift{from{opacity:.85}to{opacity:1;transform:scale(1.06)}}
  
  .card {
    position:relative; z-index:10; width:100%; max-width:440px;
    background:var(--glass); border:1.5px solid rgba(124,58,237,.5); border-radius:24px;
    padding:30px 25px; text-align:center; backdrop-filter:blur(24px);
    box-shadow:0 0 60px rgba(124,58,237,.2), 0 30px 80px rgba(0,0,0,.8);
    animation:cardIn .6s cubic-bezier(.22,.68,0,1.2) both;
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}

  .logo {
    font-family:'Orbitron',sans-serif; font-size:1.5rem; font-weight:900; letter-spacing:4px;
    background:linear-gradient(90deg,#c084fc,#67e8f9); -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,.4),transparent);margin:15px 0;}

  .timer-wrap { position:relative; width:160px; height:160px; margin:0 auto 20px; }
  .timer-svg { transform:rotate(-90deg); }
  .timer-track { fill:none; stroke:rgba(124,58,237,.1); stroke-width:10; }
  .timer-bar { fill:none; stroke-width:10; stroke-linecap:round; stroke-dasharray:471; stroke-dashoffset:471; transition:all 0.5s ease; }
  .timer-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .timer-value { font-family:'Orbitron',sans-serif; font-size:1.8rem; font-weight:900; color:#67e8f9; text-shadow:0 0 15px rgba(6,182,212,0.5); }
  .timer-label { font-size:.5rem; letter-spacing:2px; color:#a78bfa; text-transform:uppercase; margin-top:2px; }

  .stats-grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px; }
  .stat-card { background:rgba(255,255,255,0.03); border:1px solid rgba(124,58,237,0.2); border-radius:12px; padding:12px; }
  .stat-label { font-size:0.55rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  .stat-value { font-family:'Orbitron',sans-serif; font-size:0.85rem; color:#fff; margin-top:4px; }

  .btn { display:block; width:100%; padding:14px; border-radius:12px; text-decoration:none; font-family:'Orbitron',sans-serif; font-size:0.75rem; font-weight:700; margin-top:10px; transition:0.3s; }
  .btn-primary { background:linear-gradient(118deg,#7c3aed,#06b6d4); color:#fff; box-shadow:0 4px 15px rgba(124,58,237,0.4); }
  .btn-outline { border:1px solid rgba(251,191,36,0.5); color:#fde68a; background:rgba(251,191,36,0.05); }
</style>
</head>
<body>

<canvas id="galaxy"></canvas>
<div class="nebula"></div>

<div class="card">
  <div class="logo">MOBILE HUB</div>
  <div class="logo-sub" style="font-size:0.6rem; letter-spacing:2px; color:#67e8f9;">SESSION STATUS</div>
  <div class="divider"></div>

  <div id="activeState">
    <div class="timer-wrap">
      <svg width="160" height="160">
        <circle class="timer-track" cx="80" cy="80" r="75"/>
        <circle class="timer-bar" id="timerBar" cx="80" cy="80" r="75" stroke="#06b6d4"/>
      </svg>
      <div class="timer-center">
        <div class="timer-value" id="timerVal">00:00</div>
        <div class="timer-label">Remaining</div>
      </div>
    </div>

    <div class="stat-card" style="margin-bottom:10px; border-style: dashed; border-color: var(--cyan);">
        <div class="stat-label">Active Voucher</div>
        <div class="stat-value" id="voucherDisplay" style="color:var(--cyan); letter-spacing:3px;">----</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Expires At</div>
        <div class="stat-value" id="expiryTime">--:--</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Plan</div>
        <div class="stat-value" id="packageVal">--</div>
      </div>
    </div>

    <div class="divider"></div>
    <a href="login.html" class="btn btn-primary">⚡ REFRESH CONNECTION</a>
    <a href="index.html" class="btn btn-outline">💫 BUY NEW VOUCHER</a>
  </div>

  <div id="expiredState" style="display:none; padding:20px 0;">
    <div style="font-size:3rem;">⌛</div>
    <h3 style="font-family:'Orbitron'; color:#f43f5e; margin:10px 0;">EXPIRED</h3>
    <p style="font-size:0.8rem; color:var(--muted);">Your session has ended. Please top up.</p>
    <a href="index.html" class="btn btn-primary">BUY VOUCHER NOW</a>
  </div>

  <div class="card-footer" style="margin-top:20px; font-size:0.5rem; color:rgba(255,255,255,0.2);">
    ✦ MOBILE HUB UGANDA 2026 ✦
  </div>
</div>

<script>
const API_URL = 'https://mobilehubuganda-github-io.pages.dev';
const packageNames = { p1: '5 Min Test', p2: '24 Hours', p3: '7 Days', p4: '30 Days' };

function fmtTime(secs) {
  if (secs <= 0) return "00:00";
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

async function loadStatus() {
  const code = localStorage.getItem('last_voucher');
  if (!code) { window.location.href = 'login.html'; return; }

  try {
    const res = await fetch(`${API_URL}/api/voucher/session`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code.toUpperCase() })
    });
    const data = await res.json();

    if (!data.success || data.state === 'expired') {
      document.getElementById('activeState').style.display = 'none';
      document.getElementById('expiredState').style.display = 'block';
      return;
    }

    // 🕒 Setup Date (Universal Parsing)
    const expiryStr = data.expires_at.replace(' ', 'T') + 'Z';
    const expiryDate = new Date(expiryStr);
    
    document.getElementById('voucherDisplay').textContent = code.toUpperCase();
    document.getElementById('packageVal').textContent = packageNames[data.package] || data.package;
    document.getElementById('expiryTime').textContent = expiryDate.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    let remaining = Math.floor((expiryDate.getTime() - new Date().getTime()) / 1000);
    const total = data.total_secs || 300; // default 5m for safety

    const timerInt = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(timerInt);
        location.reload();
      }
      
      document.getElementById('timerVal').textContent = fmtTime(remaining);
      
      // Update Progress Ring
      const progress = Math.max(0, remaining / total);
      const offset = 471 - (progress * 471);
      document.getElementById('timerBar').style.strokeDashoffset = offset;
      
      // Color shifts
      if (progress < 0.2) document.getElementById('timerBar').setAttribute('stroke', '#f43f5e');
      else if (progress < 0.5) document.getElementById('timerBar').setAttribute('stroke', '#fbbf24');
    }, 1000);

  } catch (e) {
    console.error(e);
  }
}

loadStatus();

// Galaxy BG Animation (Cleaned up)
(function(){
  var cv=document.getElementById('galaxy'),ctx=cv.getContext('2d');
  var W,H,stars=[];
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  function mkStars(){ stars=[]; for(let i=0;i<100;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5,v:Math.random()*0.3}); }
  function draw(){
    ctx.clearRect(0,0,W,H); ctx.fillStyle="#fff";
    stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); s.y-=s.v; if(s.y<0) s.y=H; });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize);
  resize(); mkStars(); draw();
})();
</script>
</body>
</html>
